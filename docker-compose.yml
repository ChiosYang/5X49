version: '3.8'

services:
  backend:
    image: alicolia/5x49-backend:latest
    container_name: 5x49-backend
    ports:
      - "11548:8000"
    volumes:
      - ./backend/data:/app/data
      - ${MEDIA_DIR:-./media}:/media
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-openrouter/pony-alpha}
      - API_BASE_URL=${API_BASE_URL:-https://openrouter.ai/api/v1}
      - MEDIA_DIR=/media
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: alicolia/5x49-frontend:latest
    container_name: 5x49-frontend
    ports:
      - "11549:3000"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
